  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  const FONT_MIME = /^(font[/]|application[/](x-)?font-|application[/]vnd\.ms-fontobject)/i;
  const MIME_TOKEN = /^[\w.+-]+[/][\w.+-]+$/;
  function toBase64(bytes) {
    let bin = '';
    for (let i = 0; i < bytes.length; i += 0x8000) {
      bin += String.fromCharCode.apply(null, bytes.subarray(i, i + 0x8000));
    }
    return btoa(bin);
  }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    // Failed resource loads (CSP-blocked links, scripts, images) fire plain
    // events at the element — warn only; real JS errors carry message/error.
    if (!e.message && !e.error && e.target && e.target !== window) {
      console.warn('[bundle] resource failed to load:',
        e.target.tagName, String(e.target.src || e.target.href || ''));
      return;
    }
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    const resourceBlobs = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        if (FONT_MIME.test(entry.mime) && MIME_TOKEN.test(entry.mime)) {
          // Strict artifact hosts allow font-src data: but not blob:.
          blobUrls[uuid] = 'data:' + entry.mime + ';base64,' +
            (entry.compressed ? toBase64(finalBytes) : entry.data);
        } else {
          const blob = new Blob([finalBytes], { type: entry.mime });
          blobUrls[uuid] = URL.createObjectURL(blob);
          resourceBlobs[blobUrls[uuid]] = blob;
        }
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        const blob = new Blob([], { type: entry.mime });
        blobUrls[uuid] = URL.createObjectURL(blob);
        resourceBlobs[blobUrls[uuid]] = blob;
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    // Artifact-host CSP (connect-src 'self') refuses fetch() of blob: URLs —
    // consumers read these Blobs directly. Survives the swap like the error sink.
    window.__resourceBlobs = resourceBlobs;

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).replace(/<\//g, '<\\/') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: read and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const pre = resourceBlobs[s.src.split('#')[0]];
        s.textContent = pre ? await pre.text() : await (await fetch(s.src)).text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

  </script>

n=\"{{ onPwKey }}\" placeholder=\"كلمة السر\" style=\"width:100%;padding:14px 16px;border:1px solid #e0e3ea;border-radius:12px;font-size:15px;outline:none;text-align:center;letter-spacing:2px;\">\n            <sc-if value=\"{{ pwError }}\" hint-placeholder-val=\"{{ false }}\"><p style=\"margin:10px 0 0;font-size:13px;color:#d64545;text-align:center;\">كلمة السر غير صحيحة<\u002Fp><\u002Fsc-if>\n            <button sc-camel-on-click=\"{{ submitPw }}\" style=\"width:100%;margin-top:18px;padding:14px;background:#2f6fdb;color:#fff;border:none;border-radius:12px;font-size:15px;font-weight:700;cursor:pointer;\">دخول<\u002Fbutton>\n          <\u002Fdiv>\n        <\u002Fsc-if>\n\n        <!-- Editor -->\n        <sc-if value=\"{{ authed }}\" hint-placeholder-val=\"{{ false }}\">\n          <div>\n            <div style=\"position:sticky;top:0;background:#fff;border-bottom:1px solid #eef0f4;padding:20px 26px;display:flex;justify-content:space-between;align-items:center;z-index:2;\">\n              <h3 style=\"margin:0;font-size:18px;font-weight:800;\">تعديل المحتوى<\u002Fh3>\n              <div style=\"display:flex;gap:8px;\">\n                <button sc-camel-on-click=\"{{ exportData }}\" style=\"padding:9px 16px;background:#1f8a5b;color:#fff;border:none;border-radius:10px;font-size:13px;font-weight:700;cursor:pointer;\">تصدير للنشر<\u002Fbutton>\n                <button sc-camel-on-click=\"{{ closeAdmin }}\" style=\"padding:9px 16px;background:#f1f2f5;color:#16181d;border:none;border-radius:10px;font-size:13px;font-weight:700;cursor:pointer;\">تم<\u002Fbutton>\n              <\u002Fdiv>\n            <\u002Fdiv>\n\n            <div style=\"padding:22px 26px 30px;display:flex;flex-direction:column;gap:26px;\">\n\n              <sc-if value=\"{{ saveWarn }}\" hint-placeholder-val=\"{{ false }}\">\n                <div style=\"background:#fdf3e7;border:1px solid #f0d3a8;border-radius:12px;padding:13px 16px;font-size:13px;line-height:1.7;color:#8a5a12;\">\n                  ⚠️ الصور كبيرة على التخزين المؤقت للمتصفح. اضغط <b>«تصدير للنشر»<\u002Fb> واحفظ ملف <code>data.json<\u002Fcode> ثم ارفعه للمستودع — هذه هي طريقة حفظ الصور بشكل دائم.\n                <\u002Fdiv>\n              <\u002Fsc-if>\n\n              <!-- Developer -->\n              <section style=\"display:flex;flex-direction:column;gap:12px;\">\n                <div style=\"font-size:12px;font-weight:800;color:#9aa0ad;letter-spacing:1px;\">المطوّر والتواصل<\u002Fdiv>\n                <label style=\"font-size:13px;font-weight:700;color:#5b616e;\">اسمك<input value=\"{{ devName }}\" sc-camel-on-input=\"{{ editDevName }}\" style=\"display:block;width:100%;margin-top:6px;padding:11px 13px;border:1px solid #e0e3ea;border-radius:10px;font-size:14px;outline:none;\"><\u002Flabel>\n                <label style=\"font-size:13px;font-weight:700;color:#5b616e;\">رابط صورتك (الأسرع)<input value=\"{{ avatarUrl }}\" sc-camel-on-input=\"{{ editAvatarUrl }}\" placeholder=\"images/me.png\" style=\"display:block;width:100%;margin-top:6px;padding:11px 13px;border:1px solid #e0e3ea;border-radius:10px;font-size:14px;outline:none;\" dir=\"ltr\"><\u002Flabel>\n                <label style=\"font-size:13px;font-weight:700;color:#5b616e;\">أو رفع صورتك من جهازك\n                  <input type=\"file\" accept=\"image/*\" sc-camel-on-change=\"{{ uploadAvatar }}\" style=\"display:block;width:100%;margin-top:6px;font-size:13px;\">\n                <\u002Flabel>\n                <label style=\"font-size:13px;font-weight:700;color:#5b616e;\">رابط GitHub<input value=\"{{ github }}\" sc-camel-on-input=\"{{ editGithub }}\" placeholder=\"https://github.com/...\" style=\"display:block;width:100%;margin-top:6px;padding:11px 13px;border:1px solid #e0e3ea;border-radius:10px;font-size:14px;outline:none;\" dir=\"ltr\"><\u002Flabel>\n                <label style=\"font-size:13px;font-weight:700;color:#5b616e;\">رابط X / تويتر<input value=\"{{ x }}\" sc-camel-on-input=\"{{ editX }}\" placeholder=\"https://x.com/...\" style=\"display:block;width:100%;margin-top:6px;padding:11px 13px;border:1px solid #e0e3ea;border-radius:10px;font-size:14px;outline:none;\" dir=\"ltr\"><\u002Flabel>\n                <label style=\"font-size:13px;font-weight:700;color:#5b616e;\">البريد<input value=\"{{ email }}\" sc-camel-on-input=\"{{ editEmail }}\" placeholder=\"mailto:you@mail.com\" style=\"display:block;width:100%;margin-top:6px;padding:11px 13px;border:1px solid #e0e3ea;border-radius:10px;font-size:14px;outline:none;\" dir=\"ltr\"><\u002Flabel>\n              <\u002Fsection>\n\n              <div style=\"height:1px;background:#eef0f4;\"><\u002Fdiv>\n\n              <!-- Apps -->\n              <section style=\"display:flex;flex-direction:column;gap:18px;\">\n                <div style=\"font-size:12px;font-weight:800;color:#9aa0ad;letter-spacing:1px;\">التطبيقات<\u002Fdiv>\n                <sc-for list=\"{{ editApps }}\" as=\"a\" hint-placeholder-count=\"3\">\n                  <div style=\"border:1px solid #eef0f4;border-radius:14px;padding:16px;display:flex;flex-direction:column;gap:10px;background:#fbfbfc;\">\n                    <div style=\"display:flex;justify-content:space-between;align-items:center;\">\n                      <span style=\"font-size:13px;font-weight:800;color:#2f6fdb;\">تطبيق {{ a.num }}<\u002Fspan>\n                      <button sc-camel-on-click=\"{{ a.remove }}\" style=\"border:none;background:#fbeaea;color:#d64545;padding:6px 12px;border-radius:8px;font-size:12px;font-weight:700;cursor:pointer;\">حذف<\u002Fbutton>\n                    <\u002Fdiv>\n                    <input value=\"{{ a.nameAr }}\" sc-camel-on-input=\"{{ a.onNameAr }}\" placeholder=\"اسم التطبيق (عربي)\" style=\"width:100%;padding:10px 12px;border:1px solid #e0e3ea;border-radius:9px;font-size:14px;outline:none;\">\n                    <input value=\"{{ a.nameEn }}\" sc-camel-on-input=\"{{ a.onNameEn }}\" placeholder=\"الاسم بالإنجليزية (اختياري)\" style=\"width:100%;padding:10px 12px;border:1px solid #e0e3ea;border-radius:9px;font-size:14px;outline:none;\" dir=\"ltr\">\n                    <textarea sc-camel-on-input=\"{{ a.onDesc }}\" placeholder=\"وصف بسيط\" rows=\"2\" style=\"width:100%;padding:10px 12px;border:1px solid #e0e3ea;border-radius:9px;font-size:14px;outline:none;resize:vertical;\">{{ a.desc }}<\u002Ftextarea>\n                    <input value=\"{{ a.url }}\" sc-camel-on-input=\"{{ a.onUrl }}\" placeholder=\"رابط المتجر (Google Play)\" style=\"width:100%;padding:10px 12px;border:1px solid #e0e3ea;border-radius:9px;font-size:14px;outline:none;\" dir=\"ltr\">\n                    <input value=\"{{ a.imgUrl }}\" sc-camel-on-input=\"{{ a.onImgUrl }}\" placeholder=\"رابط الصورة (الأسرع — مثال: images/app1.png)\" style=\"width:100%;padding:10px 12px;border:1px solid #e0e3ea;border-radius:9px;font-size:14px;outline:none;\" dir=\"ltr\">\n                    <label style=\"font-size:12px;font-weight:700;color:#8a93a6;\">أو رفع صورة من جهازك\n                      <input type=\"file\" accept=\"image/*\" sc-camel-on-change=\"{{ a.onImg }}\" style=\"display:block;width:100%;margin-top:5px;font-size:12px;\">\n                    <\u002Flabel>\n                    <sc-if value=\"{{ a.hasImg }}\" hint-placeholder-val=\"{{ false }}\"><img src=\"{{ a.img }}\" alt=\"\" style=\"width:100%;height:110px;object-fit:cover;border-radius:8px;\"><\u002Fsc-if>\n                  <\u002Fdiv>\n                <\u002Fsc-for>\n                <button sc-camel-on-click=\"{{ addApp }}\" style=\"padding:12px;background:#eef3fd;color:#2f6fdb;border:1px dashed #b9cdf2;border-radius:12px;font-size:14px;font-weight:700;cursor:pointer;\">+ إضافة تطبيق<\u002Fbutton>\n              <\u002Fsection>\n\n              <div style=\"background:#f4f9f6;border:1px solid #d7ebe0;border-radius:12px;padding:14px 16px;font-size:13px;line-height:1.7;color:#3d6b54;\">\n                تُحفظ تعديلاتك تلقائيًا في متصفحك. لكي يراها الزوّار على GitHub: اضغط <b>«تصدير للنشر»<\u002Fb> ثم ارفع ملف <code>data.json<\u002Fcode> بجانب <code>index.html<\u002Fcode> في المستودع.\n              <\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fsc-if>\n\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsc-if>\n\n<\u002Fdiv>\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\" data-props=\"{&quot;$preview&quot;:{&quot;width&quot;:1120,&quot;height&quot;:900}}\">\nconst ADMIN_PASSWORD = \"madmoon5555\";\n\nclass Component extends DCLogic {\n  state = {\n    data: this.loadInitial(),\n    adminOpen: false,\n    authed: false,\n    pwValue: \"\",\n    pwError: false,\n    saveWarn: false,\n    loading: false\n  };\n\n  loadInitial() {\n    try {\n      const d = localStorage.getItem(\"galleryDraft\");\n      if (d) return this.normalize(JSON.parse(d));\n    } catch (e) {}\n    return this.defaultData();\n  }\n\n  defaultData() {\n    return {\n      devName: \"AlqaddiX\",\n      avatar: \"\",\n      github: \"#\",\n      x: \"#\",\n      email: \"#\",\n      apps: [\n        { id: \"a1\", nameAr: \"تطبيق الحسبة\", nameEn: \"Al-Hisba · Expense Tracker\", desc: \"تتبّع مصروفاتك ودخلك وديونك بسهولة — تقارير، تذكيرات وأمان، بدون إنترنت.\", url: \"https://play.google.com/store/apps/details?id=com.alqaddi.expense\", img: \"\" },\n        { id: \"a2\", nameAr: \"تطبيق تحدي الإنجليزية\", nameEn: \"English Challenge\", desc: \"أتقن اللغة الإنجليزية خطوة بخطوة — من المبتدئ حتى الاحتراف!\", url: \"#\", img: \"\" },\n        { id: \"a3\", nameAr: \"حفظ سورة البقرة\", nameEn: \"Memorize Al-Baqarah\", desc: \"خطة حفظ سورة البقرة في 40 يوم عبر 10 محطات — تتبّع تقدمك يومًا بيوم.\", url: \"#\", img: \"\" }\n      ]\n    };\n  }\n\n  async componentDidMount() {\n    if (localStorage.getItem(\"galleryDraft\")) return;\n    this.setState({ loading: true });\n    try {\n      const r = await fetch(\"./data.json\", { cache: \"no-store\" });\n      if (r.ok) {\n        const data = this.normalize(await r.json());\n        this.setState({ data });\n        try { localStorage.setItem(\"galleryDraft\", JSON.stringify(data)); } catch (e) {}\n      }\n    } catch (e) {}\n    this.setState({ loading: false });\n  }\n\n  normalize(d) {\n    const base = this.defaultData();\n    return {\n      devName: d.devName ?? base.devName,\n      avatar: d.avatar ?? \"\",\n      github: d.github ?? \"#\",\n      x: d.x ?? \"#\",\n      email: d.email ?? \"#\",\n      apps: Array.isArray(d.apps) ? d.apps.map((a, i) => ({\n        id: a.id || (\"a\" + Date.now() + i),\n        nameAr: a.nameAr || \"\", nameEn: a.nameEn || \"\", desc: a.desc || \"\",\n        url: a.url || \"#\", img: a.img || \"\"\n      })) : base.apps\n    };\n  }\n\n  persist(data) {\n    this.setState({ data });\n    try { localStorage.setItem(\"galleryDraft\", JSON.stringify(data)); this.setState({ saveWarn: false }); }\n    catch (e) { this.setState({ saveWarn: true }); }\n  }\n\n  setField(key, value) {\n    this.persist({ ...this.state.data, [key]: value });\n  }\n\n  setApp(id, key, value) {\n    const apps = this.state.data.apps.map(a => a.id === id ? { ...a, [key]: value } : a);\n    this.persist({ ...this.state.data, apps });\n  }\n\n  readImage(file, cb) {\n    if (!file) return;\n    const rd = new FileReader();\n    rd.onload = () => cb(rd.result);\n    rd.readAsDataURL(file);\n  }\n\n  exportData() {\n    const blob = new Blob([JSON.stringify(this.state.data, null, 2)], { type: \"application/json\" });\n    const url = URL.createObjectURL(blob);\n    const a = document.createElement(\"a\");\n    a.href = url; a.download = \"data.json\"; a.click();\n    setTimeout(() => URL.revokeObjectURL(url), 1000);\n  }\n\n  renderVals() {\n    const d = this.state.data;\n    return {\n      devName: d.devName,\n      avatar: d.avatar,\n      hasAvatar: !!d.avatar,\n      noAvatar: !d.avatar,\n      github: d.github, x: d.x, email: d.email,\n\n      apps: d.apps.map(a => ({\n        nameAr: a.nameAr, nameEn: a.nameEn, desc: a.desc, url: a.url || \"#\",\n        img: a.img, hasImg: !!a.img, noImg: !a.img, showEn: !!a.nameEn,\n        loadingImg: this.state.loading && !a.img,\n        notLoadingImg: !(this.state.loading && !a.img)\n      })),\n\n      adminOpen: this.state.adminOpen,\n      saveWarn: this.state.saveWarn,\n      needLogin: this.state.adminOpen && !this.state.authed,\n      authed: this.state.adminOpen && this.state.authed,\n      pwValue: this.state.pwValue,\n      pwError: this.state.pwError,\n\n      openAdmin: () => this.setState({ adminOpen: true }),\n      closeAdmin: () => this.setState({ adminOpen: false, pwValue: \"\", pwError: false }),\n      onPw: e => this.setState({ pwValue: e.target.value, pwError: false }),\n      onPwKey: e => { if (e.key === \"Enter\") this.submitPw(); },\n      submitPw: () => {\n        if (this.state.pwValue === ADMIN_PASSWORD) this.setState({ authed: true, pwError: false, pwValue: \"\" });\n        else this.setState({ pwError: true });\n      },\n\n      editDevName: e => this.setField(\"devName\", e.target.value),\n      editGithub: e => this.setField(\"github\", e.target.value),\n      editX: e => this.setField(\"x\", e.target.value),\n      editEmail: e => this.setField(\"email\", e.target.value),\n      avatarUrl: (d.avatar && d.avatar.indexOf(\"data:\") === 0) ? \"\" : (d.avatar || \"\"),\n      editAvatarUrl: e => this.setField(\"avatar\", e.target.value),\n      uploadAvatar: e => this.readImage(e.target.files[0], url => this.setField(\"avatar\", url)),\n\n      exportData: () => this.exportData(),\n      addApp: () => {\n        const id = \"a\" + Date.now();\n        this.persist({ ...d, apps: [...d.apps, { id, nameAr: \"تطبيق جديد\", nameEn: \"\", desc: \"\", url: \"#\", img: \"\" }] });\n      },\n\n      editApps: d.apps.map((a, i) => ({\n        num: i + 1,\n        nameAr: a.nameAr, nameEn: a.nameEn, desc: a.desc, url: a.url,\n        img: a.img, hasImg: !!a.img,\n        imgUrl: (a.img && a.img.indexOf(\"data:\") === 0) ? \"\" : (a.img || \"\"),\n        onImgUrl: e => this.setApp(a.id, \"img\", e.target.value),\n        onNameAr: e => this.setApp(a.id, \"nameAr\", e.target.value),\n        onNameEn: e => this.setApp(a.id, \"nameEn\", e.target.value),\n        onDesc: e => this.setApp(a.id, \"desc\", e.target.value),\n        onUrl: e => this.setApp(a.id, \"url\", e.target.value),\n        onImg: e => this.readImage(e.target.files[0], url => this.setApp(a.id, \"img\", url)),\n        remove: () => this.persist({ ...this.state.data, apps: this.state.data.apps.filter(x => x.id !== a.id) })\n      }))\n    };\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
